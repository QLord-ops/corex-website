# corexdigital.de - nginx config
# Frontend: /var/www/corex-website/frontend/build
# Backend: proxy to 127.0.0.1:8000

server {
    listen 80;
    server_name corexdigital.de www.corexdigital.de;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name corexdigital.de www.corexdigital.de;

    ssl_certificate /etc/letsencrypt/live/corexdigital.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/corexdigital.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/javascript application/json application/xml text/css text/plain text/xml;

    root /var/www/corex-website/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /robots.txt {
        add_header Cache-Control "public, max-age=86400";
    }
    location /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
    }
}
